<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Audio and Video Lab</title>
</head>

<body>


  <h1>Star Wars Battlefront</h1>

  <section>
    <h2>Gameplay Trailer</h2>
    <!-- Embedded YouTube video using iframe -->
    <!-- FreeCodeCamp embeddable video -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/jXU5k4U8x20"
      title="freeCodeCamp.org Responsive Web Design" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>

  </section>

  <section>
    <h2>Music</h2>
    <audio controls loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </section>

</body>

</html>
