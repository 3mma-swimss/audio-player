<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Audio and Video Lab</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fa;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      padding: 32px 24px 24px 24px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: #2c3e50;
    }

    section {
      margin-bottom: 32px;
      padding: 20px;
      border-radius: 8px;
      background: #f9fafc;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    h2 {
      color: #34495e;
      margin-top: 0;
    }

    iframe {
      display: block;
      margin: 0 auto 12px auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      max-width: 100%;
    }

    audio {
      display: block;
      margin: 0 auto;
      width: 100%;
      max-width: 500px;
    }

    footer {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-top: 40px;
      padding-bottom: 16px;
    }
  </style>
</head>


<body>
  <div class="container">
    <h1>Star Wars Battlefront</h1>
    <section>
      <h2>Gameplay Trailer</h2>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/jXU5k4U8x20"
        title="freeCodeCamp.org Responsive Web Design" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </section>
    <section>
      <h2>Music</h2>
      <audio controls loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </section>
  </div>
  <footer>
    &copy; 2026 Audio and Video Player Demo
  </footer>
</body>

</html>
